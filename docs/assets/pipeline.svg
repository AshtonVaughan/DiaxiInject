<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 680" fill="none">
  <defs>
    <linearGradient id="p1" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#6366f1"/><stop offset="100%" stop-color="#818cf8"/></linearGradient>
    <linearGradient id="p2" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#2563eb"/><stop offset="100%" stop-color="#60a5fa"/></linearGradient>
    <linearGradient id="p3" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#7c3aed"/><stop offset="100%" stop-color="#a78bfa"/></linearGradient>
    <linearGradient id="p4" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#dc2626"/><stop offset="100%" stop-color="#f87171"/></linearGradient>
    <linearGradient id="p5" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#d97706"/><stop offset="100%" stop-color="#fbbf24"/></linearGradient>
    <linearGradient id="pG" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#059669"/><stop offset="100%" stop-color="#34d399"/></linearGradient>
    <filter id="s2"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.3"/></filter>
  </defs>

  <rect width="800" height="680" rx="16" fill="#0f172a"/>

  <!-- Phase 1 -->
  <rect x="200" y="20" width="400" height="70" rx="12" fill="url(#p1)" filter="url(#s2)"/>
  <text x="228" y="44" fill="#c7d2fe" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600">PHASE 1</text>
  <text x="400" y="46" text-anchor="middle" fill="white" font-family="Inter,system-ui,sans-serif" font-size="15" font-weight="700">Single-Turn Probes</text>
  <text x="400" y="66" text-anchor="middle" fill="#e0e7ff" font-family="Inter,system-ui,sans-serif" font-size="11">69 probes x raw + mutated  =  baseline scan</text>

  <!-- Branching arrows from Phase 1 -->
  <line x1="340" y1="90" x2="340" y2="130" stroke="#475569" stroke-width="1.5"/>
  <polygon points="334,126 340,138 346,126" fill="#475569"/>
  <text x="310" y="118" fill="#94a3b8" font-family="Inter,system-ui,sans-serif" font-size="9" text-anchor="end">score &gt; 0.3</text>

  <line x1="460" y1="90" x2="460" y2="130" stroke="#475569" stroke-width="1.5"/>
  <polygon points="454,126 460,138 466,126" fill="#475569"/>
  <text x="490" y="118" fill="#94a3b8" font-family="Inter,system-ui,sans-serif" font-size="9">score &lt; 0.15</text>

  <!-- Success arrow right -->
  <path d="M600 55 L660 55 Q670 55 670 65 L670 590" stroke="#059669" stroke-width="1.5" fill="none" stroke-dasharray="4,3"/>
  <text x="680" y="52" fill="#34d399" font-family="Inter,system-ui,sans-serif" font-size="9">Success</text>

  <!-- Phase 2 -->
  <rect x="160" y="138" width="240" height="70" rx="12" fill="url(#p2)" filter="url(#s2)"/>
  <text x="188" y="162" fill="#bfdbfe" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600">PHASE 2</text>
  <text x="280" y="164" text-anchor="middle" fill="white" font-family="Inter,system-ui,sans-serif" font-size="15" font-weight="700">PAIR</text>
  <text x="280" y="184" text-anchor="middle" fill="#dbeafe" font-family="Inter,system-ui,sans-serif" font-size="11">Iterative refinement  -  ~20 iterations</text>

  <!-- Phase 3 -->
  <rect x="420" y="138" width="240" height="70" rx="12" fill="url(#p3)" filter="url(#s2)"/>
  <text x="448" y="162" fill="#ddd6fe" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600">PHASE 3</text>
  <text x="540" y="164" text-anchor="middle" fill="white" font-family="Inter,system-ui,sans-serif" font-size="15" font-weight="700">TAP</text>
  <text x="540" y="184" text-anchor="middle" fill="#ede9fe" font-family="Inter,system-ui,sans-serif" font-size="11">Tree search  -  Width 4, Depth 5</text>

  <!-- Success arrows from P2 & P3 -->
  <path d="M400 173 L660 173" stroke="#059669" stroke-width="1" fill="none" stroke-dasharray="4,3"/>
  <path d="M660 173 L660 590" stroke="#059669" stroke-width="0" fill="none"/>
  <path d="M660 173 L670 173" stroke="#059669" stroke-width="1" fill="none" stroke-dasharray="4,3"/>

  <!-- Converge arrows to Phase 4 -->
  <line x1="280" y1="208" x2="280" y2="240" stroke="#475569" stroke-width="1.5"/>
  <path d="M280 240 Q280 256 310 256 L390 256" stroke="#475569" stroke-width="1.5" fill="none"/>
  <line x1="540" y1="208" x2="540" y2="240" stroke="#475569" stroke-width="1.5"/>
  <path d="M540 240 Q540 256 510 256 L410 256" stroke="#475569" stroke-width="1.5" fill="none"/>
  <line x1="400" y1="256" x2="400" y2="274" stroke="#475569" stroke-width="1.5"/>
  <polygon points="394,270 400,282 406,270" fill="#475569"/>

  <!-- Phase 4 -->
  <rect x="200" y="282" width="400" height="70" rx="12" fill="url(#p4)" filter="url(#s2)"/>
  <text x="228" y="306" fill="#fecaca" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600">PHASE 4</text>
  <text x="400" y="308" text-anchor="middle" fill="white" font-family="Inter,system-ui,sans-serif" font-size="15" font-weight="700">Crescendo</text>
  <text x="400" y="330" text-anchor="middle" fill="#fef2f2" font-family="Inter,system-ui,sans-serif" font-size="11">Multi-turn gradual escalation  -  10-15 turns</text>

  <!-- Arrow to Phase 5 -->
  <line x1="400" y1="352" x2="400" y2="398" stroke="#475569" stroke-width="1.5"/>
  <polygon points="394,394 400,406 406,394" fill="#475569"/>
  <text x="414" y="382" fill="#94a3b8" font-family="Inter,system-ui,sans-serif" font-size="9">score 0.5-0.7</text>

  <!-- Success arrow from P4 -->
  <path d="M600 317 L670 317" stroke="#059669" stroke-width="1" fill="none" stroke-dasharray="4,3"/>

  <!-- Phase 5 -->
  <rect x="200" y="406" width="400" height="70" rx="12" fill="url(#p5)" filter="url(#s2)"/>
  <text x="228" y="430" fill="#fef3c7" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600">PHASE 5</text>
  <text x="400" y="432" text-anchor="middle" fill="white" font-family="Inter,system-ui,sans-serif" font-size="15" font-weight="700">Genetic Evolution</text>
  <text x="400" y="454" text-anchor="middle" fill="#fefce8" font-family="Inter,system-ui,sans-serif" font-size="11">Evolve near-misses  -  50 generations, population 20</text>

  <!-- Success arrow from P5 -->
  <path d="M600 441 L670 441" stroke="#059669" stroke-width="1" fill="none" stroke-dasharray="4,3"/>

  <!-- Arrow to output -->
  <line x1="400" y1="476" x2="400" y2="520" stroke="#475569" stroke-width="1.5"/>

  <!-- Success collector line -->
  <line x1="670" y1="55" x2="670" y2="520" stroke="#059669" stroke-width="1.5" stroke-dasharray="4,3"/>
  <path d="M670 520 Q670 530 660 530 L410 530" stroke="#059669" stroke-width="1.5" fill="none" stroke-dasharray="4,3"/>
  <path d="M400 520 L400 530" stroke="#475569" stroke-width="1.5"/>

  <!-- Final arrow -->
  <line x1="400" y1="530" x2="400" y2="558" stroke="#475569" stroke-width="1.5"/>
  <polygon points="394,554 400,566 406,554" fill="#475569"/>

  <!-- Output node -->
  <rect x="200" y="566" width="400" height="70" rx="12" fill="url(#pG)" filter="url(#s2)"/>
  <text x="400" y="594" text-anchor="middle" fill="white" font-family="Inter,system-ui,sans-serif" font-size="16" font-weight="700">Findings</text>
  <text x="400" y="616" text-anchor="middle" fill="#d1fae5" font-family="Inter,system-ui,sans-serif" font-size="12">Evidence Engine  &#8594;  HackerOne / MSRC Reports</text>

  <!-- Success label -->
  <rect x="692" y="275" width="70" height="24" rx="6" fill="#059669" fill-opacity="0.2"/>
  <text x="727" y="291" text-anchor="middle" fill="#34d399" font-family="Inter,system-ui,sans-serif" font-size="10" font-weight="600">SUCCESS</text>
</svg>
