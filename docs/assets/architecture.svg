<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 620" fill="none">
  <defs>
    <linearGradient id="gPurple" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#7c3aed"/><stop offset="100%" stop-color="#6366f1"/></linearGradient>
    <linearGradient id="gSlate" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#1e293b"/><stop offset="100%" stop-color="#334155"/></linearGradient>
    <linearGradient id="gRed" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#dc2626"/><stop offset="100%" stop-color="#ef4444"/></linearGradient>
    <linearGradient id="gBlue" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#2563eb"/><stop offset="100%" stop-color="#3b82f6"/></linearGradient>
    <linearGradient id="gAmber" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#d97706"/><stop offset="100%" stop-color="#f59e0b"/></linearGradient>
    <linearGradient id="gGreen" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#059669"/><stop offset="100%" stop-color="#10b981"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.3"/></filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="620" rx="16" fill="#0f172a"/>

  <!-- YOU node -->
  <rect x="310" y="24" width="180" height="52" rx="12" fill="url(#gPurple)" filter="url(#shadow)"/>
  <text x="400" y="48" text-anchor="middle" fill="white" font-family="Inter,system-ui,sans-serif" font-size="15" font-weight="700">You</text>
  <text x="400" y="65" text-anchor="middle" fill="#e0d4ff" font-family="Inter,system-ui,sans-serif" font-size="11">Security Researcher</text>

  <!-- Arrow 1 -->
  <line x1="400" y1="76" x2="400" y2="104" stroke="#475569" stroke-width="2"/>
  <polygon points="394,100 400,112 406,100" fill="#475569"/>

  <!-- CLI node -->
  <rect x="270" y="112" width="260" height="52" rx="12" fill="url(#gSlate)" stroke="#475569" stroke-width="1" filter="url(#shadow)"/>
  <text x="400" y="136" text-anchor="middle" fill="white" font-family="Inter,system-ui,sans-serif" font-size="15" font-weight="700">DiaxiInject CLI</text>
  <text x="400" y="153" text-anchor="middle" fill="#94a3b8" font-family="Inter,system-ui,sans-serif" font-size="11">Campaign Controller</text>

  <!-- Split arrows -->
  <path d="M330 164 L330 178 Q330 188 320 188 L210 188 Q200 188 200 198 L200 214" stroke="#475569" stroke-width="2" fill="none"/>
  <polygon points="194,210 200,222 206,210" fill="#475569"/>
  <path d="M470 164 L470 178 Q470 188 480 188 L590 188 Q600 188 600 198 L600 214" stroke="#475569" stroke-width="2" fill="none"/>
  <polygon points="594,210 600,222 606,210" fill="#475569"/>

  <!-- Attacker LLM node -->
  <rect x="90" y="222" width="220" height="120" rx="12" fill="url(#gRed)" filter="url(#shadow)"/>
  <text x="200" y="250" text-anchor="middle" fill="white" font-family="Inter,system-ui,sans-serif" font-size="16" font-weight="700">Attacker LLM</text>
  <text x="200" y="270" text-anchor="middle" fill="#fecaca" font-family="Inter,system-ui,sans-serif" font-size="12">Local / vLLM  -  Uncensored</text>
  <line x1="130" y1="284" x2="270" y2="284" stroke="#fca5a5" stroke-width="0.5" stroke-opacity="0.4"/>
  <text x="200" y="302" text-anchor="middle" fill="#fde8e8" font-family="Inter,system-ui,sans-serif" font-size="11">Generates attacks</text>
  <text x="200" y="318" text-anchor="middle" fill="#fde8e8" font-family="Inter,system-ui,sans-serif" font-size="11">Scores responses &amp; evolves bypasses</text>
  <text x="200" y="334" text-anchor="middle" fill="#fde8e8" font-family="Inter,system-ui,sans-serif" font-size="11">Plans multi-turn &amp; writes reports</text>

  <!-- Target LLM node -->
  <rect x="490" y="222" width="220" height="120" rx="12" fill="url(#gBlue)" filter="url(#shadow)"/>
  <text x="600" y="250" text-anchor="middle" fill="white" font-family="Inter,system-ui,sans-serif" font-size="16" font-weight="700">Target LLM</text>
  <text x="600" y="270" text-anchor="middle" fill="#bfdbfe" font-family="Inter,system-ui,sans-serif" font-size="12">Cloud API</text>
  <line x1="530" y1="284" x2="670" y2="284" stroke="#93c5fd" stroke-width="0.5" stroke-opacity="0.4"/>
  <text x="600" y="302" text-anchor="middle" fill="#dbeafe" font-family="Inter,system-ui,sans-serif" font-size="11">OpenAI  /  Google  /  Microsoft</text>
  <text x="600" y="318" text-anchor="middle" fill="#dbeafe" font-family="Inter,system-ui,sans-serif" font-size="11">Anthropic  /  Meta  /  xAI</text>
  <text x="600" y="334" text-anchor="middle" fill="#dbeafe" font-family="Inter,system-ui,sans-serif" font-size="11">Mistral  /  HuggingFace</text>

  <!-- Converge arrows -->
  <path d="M200 342 L200 370 Q200 380 210 380 L390 380" stroke="#475569" stroke-width="2" fill="none"/>
  <path d="M600 342 L600 370 Q600 380 590 380 L410 380" stroke="#475569" stroke-width="2" fill="none"/>
  <line x1="400" y1="380" x2="400" y2="404" stroke="#475569" stroke-width="2"/>
  <polygon points="394,400 400,412 406,400" fill="#475569"/>

  <!-- Scoring Pipeline node -->
  <rect x="220" y="412" width="360" height="60" rx="12" fill="url(#gAmber)" filter="url(#shadow)"/>
  <text x="400" y="438" text-anchor="middle" fill="white" font-family="Inter,system-ui,sans-serif" font-size="15" font-weight="700">Scoring Pipeline</text>
  <text x="400" y="458" text-anchor="middle" fill="#fef3c7" font-family="Inter,system-ui,sans-serif" font-size="12">Rules  &#8594;  Classifier  &#8594;  LLM Judge</text>

  <!-- Arrow 4 -->
  <line x1="400" y1="472" x2="400" y2="510" stroke="#475569" stroke-width="2"/>
  <polygon points="394,506 400,518 406,506" fill="#475569"/>

  <!-- Evidence Engine node -->
  <rect x="220" y="518" width="360" height="60" rx="12" fill="url(#gGreen)" filter="url(#shadow)"/>
  <text x="400" y="544" text-anchor="middle" fill="white" font-family="Inter,system-ui,sans-serif" font-size="15" font-weight="700">Evidence Engine</text>
  <text x="400" y="564" text-anchor="middle" fill="#d1fae5" font-family="Inter,system-ui,sans-serif" font-size="12">HackerOne  /  MSRC  /  Bugcrowd Reports</text>
</svg>
