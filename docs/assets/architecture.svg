<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 520" fill="none">
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; }
    .label { fill: #6e7681; font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; }
    .label-accent { fill: #58a6ff; font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; }
    .title { fill: #e6edf3; font-size: 13px; font-weight: 600; }
    .sub { fill: #8b949e; font-size: 11px; }
    .detail { fill: #6e7681; font-size: 10px; }
    .line { stroke: #30363d; stroke-width: 1; fill: none; }
    .line-accent { stroke: #58a6ff; stroke-width: 1; fill: none; opacity: 0.5; }
    .dot { fill: #58a6ff; }
  </style>

  <!-- YOU -->
  <circle cx="360" cy="30" r="3" class="dot"/>
  <text x="360" y="22" text-anchor="middle" class="label">YOU</text>

  <line x1="360" y1="33" x2="360" y2="62" class="line"/>
  <polygon points="356,58 360,66 364,58" fill="#30363d"/>

  <!-- CLI box -->
  <rect x="220" y="66" width="280" height="44" rx="5" fill="none" stroke="#58a6ff" stroke-width="1"/>
  <text x="360" y="86" text-anchor="middle" class="title">DiaxiInject CLI</text>
  <text x="360" y="100" text-anchor="middle" class="detail">campaign controller</text>

  <!-- Split line -->
  <line x1="360" y1="110" x2="360" y2="134" class="line"/>
  <line x1="180" y1="134" x2="540" y2="134" class="line"/>
  <line x1="180" y1="134" x2="180" y2="162" class="line"/>
  <line x1="540" y1="134" x2="540" y2="162" class="line"/>
  <polygon points="176,158 180,166 184,158" fill="#30363d"/>
  <polygon points="536,158 540,166 544,158" fill="#30363d"/>

  <!-- Attacker LLM -->
  <rect x="60" y="166" width="240" height="138" rx="5" fill="none" stroke="#30363d" stroke-width="1"/>
  <text x="80" y="186" class="label-accent">ATTACKER</text>
  <text x="180" y="208" text-anchor="middle" class="title">Local LLM</text>
  <text x="180" y="224" text-anchor="middle" class="sub">vLLM / Uncensored</text>
  <line x1="80" y1="236" x2="280" y2="236" stroke="#21262d" stroke-width="1"/>
  <text x="180" y="256" text-anchor="middle" class="detail">Generates adversarial prompts</text>
  <text x="180" y="272" text-anchor="middle" class="detail">Scores target responses</text>
  <text x="180" y="288" text-anchor="middle" class="detail">Evolves novel bypasses</text>

  <!-- Target LLM -->
  <rect x="420" y="166" width="240" height="138" rx="5" fill="none" stroke="#30363d" stroke-width="1"/>
  <text x="440" y="186" class="label-accent">TARGET</text>
  <text x="540" y="208" text-anchor="middle" class="title">Cloud LLM</text>
  <text x="540" y="224" text-anchor="middle" class="sub">API Endpoint</text>
  <line x1="440" y1="236" x2="640" y2="236" stroke="#21262d" stroke-width="1"/>
  <text x="540" y="256" text-anchor="middle" class="detail">OpenAI / Google / Microsoft</text>
  <text x="540" y="272" text-anchor="middle" class="detail">Anthropic / Meta / xAI</text>
  <text x="540" y="288" text-anchor="middle" class="detail">Mistral / HuggingFace</text>

  <!-- Bidirectional arrow between attacker and target -->
  <line x1="300" y1="210" x2="420" y2="210" class="line-accent" stroke-dasharray="4 3"/>

  <!-- Converge lines -->
  <line x1="180" y1="304" x2="180" y2="340" class="line"/>
  <line x1="540" y1="304" x2="540" y2="340" class="line"/>
  <line x1="180" y1="340" x2="540" y2="340" class="line"/>
  <line x1="360" y1="340" x2="360" y2="368" class="line"/>
  <polygon points="356,364 360,372 364,364" fill="#30363d"/>

  <!-- Scoring Pipeline -->
  <rect x="120" y="372" width="480" height="48" rx="5" fill="none" stroke="#30363d" stroke-width="1"/>
  <text x="140" y="393" class="label">SCORING</text>

  <!-- Three tier pills inside scoring -->
  <text x="228" y="393" text-anchor="middle" class="sub">Rules</text>
  <text x="282" y="393" text-anchor="middle" class="detail">&rarr;</text>
  <text x="348" y="393" text-anchor="middle" class="sub">Classifier</text>
  <text x="414" y="393" text-anchor="middle" class="detail">&rarr;</text>
  <text x="480" y="393" text-anchor="middle" class="sub">LLM Judge</text>
  <text x="360" y="410" text-anchor="middle" class="detail">three-tier cascade / threshold 0.7</text>

  <!-- Arrow to output -->
  <line x1="360" y1="420" x2="360" y2="452" class="line"/>
  <polygon points="356,448 360,456 364,448" fill="#30363d"/>

  <!-- Evidence Engine -->
  <rect x="120" y="456" width="480" height="48" rx="5" fill="none" stroke="#58a6ff" stroke-width="1"/>
  <text x="140" y="477" class="label-accent">OUTPUT</text>
  <text x="360" y="477" text-anchor="middle" class="title">Evidence Engine</text>
  <text x="360" y="493" text-anchor="middle" class="detail">HackerOne / MSRC / Bugcrowd reports</text>
</svg>